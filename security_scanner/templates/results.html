<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>CyberRisk Assessment — {{ domain }} · Phishield</title>
  <link rel="stylesheet" href="{{ request.script_root }}/static/dashboard/app.css">
  <style>
    /* Pre-hydration placeholder — dark, so there is no white flash before
       the React bundle paints. Replaced entirely once the app mounts. */
    html, body { margin: 0; background: #060b14; }
    #boot {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #67758f; font-size: 13px; letter-spacing: .02em;
    }
    #boot .dot { width: 7px; height: 7px; border-radius: 50%; background: #7357f5;
      display: inline-block; margin-right: 9px; animation: bp 1s ease-in-out infinite; }
    @keyframes bp { 0%,100%{opacity:.25} 50%{opacity:1} }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><span class="dot"></span>Loading assessment…</div>
  </div>

  <noscript>
    <div style="padding:24px;color:#f2f5fb;background:#060b14;font-family:sans-serif">
      This CyberRisk assessment dashboard requires JavaScript. The full report is
      also available as a PDF via <a style="color:#8c72ff" href="{{ request.script_root }}/api/scan/{{ scan_id }}/pdf">Download PDF</a>.
    </div>
  </noscript>

  <script>
    // Server-injected, identical contract to the legacy template. results_json
    // is the escaped RESULTS object (or null while pending/failed); SCAN_META
    // drives which top-level view React renders.
    window.RESULTS = {{ results_json | safe }};
    window.SCAN_META = {
      scanId: {{ scan_id | tojson }},
      domain: {{ domain | tojson }},
      status: {{ status | tojson }}
    };
    window.CHECKER_MANIFEST = {{ manifest_json | safe }};
  </script>
  <script type="module" src="{{ request.script_root }}/static/dashboard/app.js"></script>
</body>
</html>
