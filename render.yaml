# NOTE: the phishield-scanner service was RETIRED (2026-07-06). Production now
# runs on the Google Cloud VM (veilguard.phishield.com/scanner), tarball-deployed
# via security_scanner/deploy/deploy_vm.sh. Its Render service block was removed
# from this blueprint; suspend/delete the phishield-scanner service in the Render
# dashboard to complete decommission.
services:
  - type: web
    name: life-planner
    runtime: static
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /planner.html

  - type: web
    name: sme-rating-engine
    runtime: python
    rootDir: SME Rating Engine
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: "10000"
    plan: free
